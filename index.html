<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Fotografico</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }
    .header {
      width: 100%;
      background: #222;
      color: #7b7a7a;
      padding: 0;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      height: 60px;
    }
    .nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1em;
      padding: 8px 18px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .nav a:hover {
      background: #444;
    }
    .main {
      margin-top: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      position: relative;
    }
    .profile-center {
      display: contents;
    }
    
    .profile-img {
      width: 320px;
      max-width: 90vw;
      border-radius: 20px;
      margin: 30px 0 20px 0;
      object-fit: contain;
      display: inline-block;
      background: transparent;
      padding: 0;
      border: none;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 0.2em;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 1.2em;
      color: #888;
      margin-bottom: 1.5em;
    }
    .collaborations {
      position: absolute;
      left: 20px;
      top: 120px;
      text-align: left;
      width: 180px;
    }
    .collaborations h3 {
      font-size: 0.9em;
      margin: 0 0 10px 0;
      color: #222;
    }
    .collaborations ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .collaborations li {
      font-size: 0.8em;
      color: #555;
      background: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    @media (max-width: 900px) {
      .collaborations { position: static; width: 100%; left: auto; top: auto; margin-bottom: 20px; }
    }
    @media (max-width: 600px) {
      .nav { gap: 15px; height: 50px; }
      .main { margin-top: 80px; }
      .profile-img { width: 95vw; }
      h1 { font-size: 1.5em; }
      .collaborations { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="header">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="galleria.html">Galleria</a>
      <a href="contatti.html">Contatti</a>
    </nav>
  </div>

  <div class="main">
    <div class="collaborations">
      <h3>Esperienze</h3>
      <ul>
        <li>Mille miglia 2023</li>
        <li>Garda lakers</li>
      </ul>
    </div>

    <div class="profile-center">
      <img src="ChatGPT%20Image%2016%20feb%202026%2C%2018_40_41.png" alt="Logo MF" class="profile-img">
      <h1>Franchini Matteo</h1>
      <div class="subtitle">Fotografo sportivo</div>
    </div>
  </div>

</body>
</html>
