<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Galleria Fotografica</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #fff; }
    .header {
      width: 100%;
      background: #222;
      color: #fff;
      padding: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      height: 60px;
    }
    .nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1em;
      padding: 8px 18px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .nav a:hover {
      background: #444;
    }
    .gallery {
      margin-top: 80px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 30px;
      justify-items: center;
    }
    .gallery img {
      width: 100%;
      max-width: 350px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      object-fit: cover;
      transition: transform 0.3s;
      background: #222;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.7s forwards;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .edit-section {
      margin-top: 50px;
      text-align: center;
    }
    .edit-section h2 {
      color: #fff;
      font-size: 2em;
      margin-bottom: 30px;
    }
    .edit-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 30px;
      justify-items: center;
    }
    .edit-gallery img {
      width: 100%;
      max-width: 350px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      object-fit: cover;
      transition: transform 0.3s;
      background: #222;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.7s forwards;
    }
    .edit-gallery img:hover {
      transform: scale(1.05);
    }
    .basket-section, .calcio-section {
      margin-top: 50px;
      text-align: center;
    }
    .basket-section h2, .calcio-section h2 {
      color: #fff;
      font-size: 2em;
      margin-bottom: 30px;
    }
    .basket-gallery, .calcio-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 30px;
      justify-items: center;
    }
    .basket-gallery img, .calcio-gallery img {
      width: 100%;
      max-width: 350px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      object-fit: cover;
      transition: transform 0.3s;
      background: #222;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.7s forwards;
    }
    .calcio-gallery img {
      max-width: 450px;
    }
    .basket-gallery img:hover, .calcio-gallery img:hover {
      transform: scale(1.05);
    }
    .lightbox-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    .lightbox-overlay.show {
      display: flex !important;
    }
    .lightbox-content {
      position: relative;
      max-width: 95%;
      max-height: 95vh;
    }
    .lightbox-content img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 5px;
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      // Lazy load
      document.querySelectorAll('img').forEach(img => {
        if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
      });
      
      // Lightbox - SEMPLICE E DIRETTO
      const overlay = document.getElementById('lightbox-overlay');
      const modalImg = document.getElementById('lightbox-img');
      const closeBtn = document.getElementById('lightbox-close');
      
      // Apri lightbox
      document.querySelectorAll('.basket-gallery img, .calcio-gallery img, .edit-gallery img').forEach(img => {
        img.addEventListener('click', function(evt) {
          evt.preventDefault();
          evt.stopPropagation();
          console.log('Click immagine:', this.src);
          modalImg.src = this.src;
          overlay.classList.add('show');
        });
      });
      
      // Chiudi lightbox
      function closeLightbox() {
        overlay.classList.remove('show');
      }
      
      closeBtn.addEventListener('click', closeLightbox);
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeLightbox();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLightbox();
      });
    });
  </script>
