<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Contatti</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }
    .header {
      width: 100%;
      background: #222;
      color: #7b7a7a;
      padding: 0;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      height: 60px;
    }
    .nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1em;
      padding: 8px 18px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .nav a:hover {
      background: #444;
    }
    .main {
      margin-top: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 40px 20px;
    }
    .contact-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    .contact-card h1 {
      color: #222;
      margin-bottom: 30px;
      font-size: 2.5em;
    }
    .contact-item {
      margin: 20px 0;
      padding: 15px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    .contact-item:hover {
      background: #f8f9fa;
    }
    .contact-item a {
      color: #007bff;
      text-decoration: none;
      font-size: 1.2em;
      font-weight: 500;
    }
    .contact-item a:hover {
      text-decoration: underline;
    }
    .contact-icon {
      margin-right: 10px;
      font-size: 1.5em;
    }
    @media (max-width: 600px) {
      .nav { gap: 15px; height: 50px; }
      .main { margin-top: 80px; }
      .contact-card { padding: 30px 20px; }
      .contact-card h1 { font-size: 2em; }
    }
  </style>
</head>
<body>
  <div class="header">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="galleria.html">Galleria</a>
      <a href="contatti.html">Contatti</a>
    </nav>
  </div>
  <div class="main">
    <div class="contact-card">
      <h1>Contatti</h1>
      <div class="contact-item">
        <span class="contact-icon">📧</span>
        <a href="mailto:matteone112@gmail.com">matteone112@gmail.com</a>
      </div>
      <div class="contact-item">
        <span class="contact-icon">📱</span>
        <a href="tel:3270006141">327 000 6141</a>
      </div>
      <div class="contact-item">
        <span class="contact-icon">📸</span>
        <a href="https://www.instagram.com/pixel_m_perfetto" target="_blank">@pixel_m_perfetto</a>
      </div>
    </div>
  </div>
</body>
</html>
